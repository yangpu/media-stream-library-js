<!doctype html>
<html>
  <head>
    <title>Example H.264 video streaming -- dowpuyang</title>
  </head>

  <body>
    <div class="player-wrap" style="position: fixed; width: 960px; height: 540px">
      <video
        style="position: absolute; width: 100%; height: 100%"
        muted
        autoplay
        controls
      ></video>
      <div class="loading-overlay" id="loadingOverlay" aria-hidden="true">
        <div class="loading-spinner"></div>
        <span class="loading-text">重连中…</span>
      </div>
    </div>
    <style>
      .player-wrap { position: relative; }
      .loading-overlay {
        position: absolute; left: 0; top: 0; right: 0; bottom: 0;
        display: none; align-items: center; justify-content: center;
        flex-direction: column; gap: 12px;
        background: rgba(0,0,0,0.7); z-index: 9999;
        pointer-events: auto;
      }
      .loading-overlay.visible { display: flex; }
      .loading-spinner {
        width: 48px; height: 48px;
        border: 4px solid rgba(255,255,255,0.3);
        border-top-color: #fff; border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      .loading-text { color: #fff; font-size: 14px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" src="h264-player.js"></script>
  </body>
</html>
